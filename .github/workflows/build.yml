name: build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build KeyboardLanguageGuard.sln --configuration Release

      - name: Run tests
        run: dotnet run --project tests/KeyboardLanguageGuard.Tests/KeyboardLanguageGuard.Tests.csproj --configuration Release

      - name: Publish self-contained app
        run: dotnet publish src/KeyboardLanguageGuard.App/KeyboardLanguageGuard.App.csproj --configuration Release --runtime win-x64 --self-contained true --output artifacts/publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyFix-win-x64
          path: artifacts/publish
