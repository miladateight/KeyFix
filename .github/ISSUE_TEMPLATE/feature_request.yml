name: Feature request
description: Suggest an improvement for KeyFix
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Suggested solution
      description: What would you like KeyFix to do?
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy impact
      description: Would this feature need to process, store, or send typed text?
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Related language/layout
      options:
        - English
        - Persian
        - Arabic
        - German
        - Multiple
        - Other
