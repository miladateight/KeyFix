name: Bug report
description: Report a problem with KeyFix
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please do not include private typed text, passwords, or sensitive screenshots.
  - type: input
    id: version
    attributes:
      label: KeyFix version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Enable ...
        2. Type ...
        3. Press Space ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: settings
    attributes:
      label: Settings check
      options:
        - label: I enabled only the languages I actually use in Settings.
        - label: I tested with AutoSwitch enabled if this is an auto-correction issue.
